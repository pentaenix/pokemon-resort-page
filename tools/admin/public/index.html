<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Resort Operations Desk</title>
  <link rel="stylesheet" href="/admin.css" />
</head>
<body>
  <header class="topbar">
    <div><span>Local-only</span><h1>Resort Operations Desk</h1></div>
    <nav id="tabs"></nav>
  </header>
  <main id="app"><p class="loading">Loading resort data…</p></main>
  <aside id="logDock" class="log-dock" aria-label="Activity log">
    <header class="log-dock-head">
      <div><strong>Activity log</strong><span id="logStatus" class="log-status">Ready</span></div>
      <div class="log-dock-actions">
        <button type="button" class="log-dock-toggle" id="toggleLogDock" aria-expanded="true" aria-controls="deskLog" title="Hide activity log">▼</button>
        <button type="button" class="btn ghost small log-dock-clear" id="clearLog">Clear</button>
      </div>
    </header>
    <pre id="deskLog" class="desk-log">Resort Operations Desk loaded.\n</pre>
  </aside>
  <script type="module" src="/admin.js"></script>
</body>
</html>
