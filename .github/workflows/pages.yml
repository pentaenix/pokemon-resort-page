name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Node 20 LTS — avoids intermittent "Exit handler never called!" on npm ci with Node 22.x runners
          node-version: 20
          cache: npm
      - name: Install dependencies
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
        run: |
          for attempt in 1 2 3; do
            npm ci --no-audit --no-fund && break
            echo "npm ci failed (attempt $attempt), retrying…"
            npm cache clean --force
            sleep 3
            if [ "$attempt" -eq 3 ]; then exit 1; fi
          done
          test -x node_modules/.bin/vite || (echo "vite not installed after npm ci" && exit 1)
      - name: Validate data
        run: npm run validate:data
      - name: Build
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
